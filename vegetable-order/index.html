<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>陈老四蔬菜单</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 页面居中与背景美化 */
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Tahoma, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        /* 表单容器卡片化设计 */
        .box {
            background: #ffffff;
            padding: 35px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }

        /* 标题样式 */
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: bold;
        }

        /* 表单项布局 */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            color: #34495e;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* 输入框与多行文本框统一风格 */
        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #27ae60;
        }

        /* 专门针对粘贴框的设置 */
        textarea {
            resize: vertical;
            min-height: 160px;
            line-height: 1.5;
        }

        /* 提交按钮美化 */
        button[type="submit"] {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button[type="submit"]:hover {
            background-color: #2ecc71;
        }
        
        button[type="submit"]:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="box">
    <h2>陈老四蔬菜批发</h2>
    <form action="/generate" method="post">
        
        <div class="form-group">
    <label for="customer">客户名称：</label>

    <input 
        type="text" 
        id="customer" 
        name="customer" 
        maxlength="6"
        placeholder="请输入客户名称"
    >
</div>

        
        <div class="form-group">
            <label for="date">日期：</label>
            <input type="date" id="date" name="date">
        </div>
        
        <div class="form-group">
            <label for="dishes">菜品列表：</label>
            <textarea id="dishes" name="dishes" placeholder="请在此处直接粘贴菜品列表，每行一个..."></textarea>
        </div>
        
        <button type="submit">生成订单并下载</button>
        
    </form>
</div>

<script>
    // 获取当天的日期并格式化为 YYYY-MM-DD，自动填充到日期输入框中
    const today = new Date();
    // 由于存在时区差异，使用以下方法提取本地日期的 YYYY-MM-DD 格式最准确
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    
    document.getElementById('date').value = `${year}-${month}-${day}`;
</script>

</body>
</html>
